<app-navbar-one />

<div class="flex items-center gap-4 flex-wrap bg-overlay p-14 sm:p-16 before:bg-title before:bg-opacity-70"
    style="background-image:url('assets/img/shortcode/breadcumb.jpg');">
    <div class="text-center w-full">
        <h2 class="text-white text-8 md:text-[40px] font-normal leading-none text-center">Order History</h2>
        <ul
            class="flex items-center justify-center gap-[10px] text-base md:text-lg leading-none font-normal text-white mt-3 md:mt-4">
            <li><a [routerLink]="'/'">Home</a></li>
            <li>/</li>
            <li class="text-primary">History</li>
        </ul>
    </div>
</div>

<div class="s-py-100" data-aos="fade-up">
    <div class="container-fluid">
        <div
            class="max-w-[1720px] mx-auto flex items-start gap-8 md:gap-12 2xl:gap-24 flex-col md:flex-row my-profile-navtab">
            <div class="w-full md:w-[200px] lg:w-[300px] flex-none">
                <app-account-tab />
            </div>
            <div class="w-full md:w-auto md:flex-1 overflow-auto">
                <div class="flex xl:flex-row flex-col gap-[30px] lg:gap-[30px] xl:gap-[70px]">
                    <div class="flex-1 overflow-auto">
                        <table id="cart-table" class="responsive nowrap table-wrapper" style="width:100%">
                            <thead class="table-header">
                                <tr>
                                    <th
                                        class="text-lg md:text-xl font-semibold leading-none text-title dark:text-white">
                                        Order ID
                                    </th>
                                    <th
                                        class="text-lg md:text-xl font-semibold leading-none text-title dark:text-white">
                                        Date
                                    </th>
                                    <th
                                        class="text-lg md:text-xl font-semibold leading-none text-title dark:text-white">
                                        Status
                                    </th>
                                    <th
                                        class="text-lg md:text-xl font-semibold leading-none text-title dark:text-white">
                                        Cost
                                    </th>
                                    <th
                                        class="text-lg md:text-xl font-semibold leading-none text-title dark:text-white">
                                        Transaction Status
                                    </th>
                                    <th class="w-[25%]"></th>
                                </tr>
                            </thead>
                            <tbody class="table-body">
                                <tr *ngIf="ordersList.length === 0">
                                    <td colspan="5"
                                        class="text-center py-10 text-lg md:text-xl font-medium text-title dark:text-white">
                                        <div class="loader-wrapper" *ngIf="isLoading">
                                            <span class="loader"></span>
                                        </div>
                                        <h6 class="text-center mt-3" *ngIf="!isLoading">{{isLoading ? 'Please wait while loading' : 'No orders found'}}</h6>
                                    </td>
                                </tr>
                                <tr *ngFor="let item of ordersList">
                                    <td>
                                        <h6
                                            class="text-base md:text-lg leading-none text-title dark:text-white font-semibold">
                                            {{item.id}}    
                                        </h6>
                                    </td>
                                    <td>{{item.odate}}</td>
                                    <td>{{item.ostatus}}</td>
                                    <td>{{item.billamount | currency : 'INR'}}</td>
                                    <td>{{item.pstatus}}</td>
                                    <td>
                                        <button class="btn btn-theme-outline btn-sm shop1-button w-50" data-text="Check Status"
                                            (click)="checkPaymentStatus(item.referenceId)">
                                            <span>Check Status</span>
                                        </button>
                                    </td>
                                    
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<app-footer-one />
